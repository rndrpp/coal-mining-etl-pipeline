version: '3.8'

# ── Shared Airflow config (YAML anchor) ────────────────────────────────────────
x-airflow-common: &airflow-common
  env_file:
    - .env
  build:
    context: ./docker/airflow
    dockerfile: Dockerfile
  environment: &airflow-common-env
    # Core
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    # Database
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
    # Celery
    AIRFLOW__CELERY__BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
    # Logging
    AIRFLOW__LOGGING__LOGGING_LEVEL: INFO
    AIRFLOW__LOGGING__COLORED_CONSOLE_LOG: 'true'
    # API
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
    # Pipeline env vars (passed to tasks)
    MINIO_ENDPOINT: http://minio:9000
    MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
    MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
    MINIO_BUCKET: ${MINIO_BUCKET}
    DWH_HOST: postgres
    DWH_PORT: 5432
    DWH_DB: ${DWH_DB}
    DWH_USER: ${DWH_USER}
    DWH_PASSWORD: ${DWH_PASSWORD}
    SPARK_MASTER_URL: ${SPARK_MASTER_URL}

  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./data:/opt/airflow/data:ro          # read-only: tasks hanya baca source
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  networks:
    - airflow-net
    - storage-net                           # workers perlu reach MinIO & PostgreSQL DWH
    - spark-net                             # workers perlu reach Spark Master & Workers

# ──────────────────────────────────────────────────────────────────────────────
services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: coal_postgres
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_db:/docker-entrypoint-initdb.d  # auto-run on first start
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-airflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - airflow-net
      - storage-net
    restart: unless-stopped

  # ── Redis (Celery broker) ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: coal_redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - airflow-net
    restart: unless-stopped

  # ── MinIO (Data Lake) ────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: coal_minio
    command: server /data --console-address ":9001"
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"    # S3 API
      - "9001:9001"    # Web Console
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - storage-net
    restart: unless-stopped

  # ── Spark Master ─────────────────────────────────────────────────────────────
  spark-master:
    image: apache/spark:3.5.0
    container_name: coal_spark_master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "7077:7077"
      - "8181:8080"
    networks:
      - spark-net
      - storage-net
    restart: unless-stopped

    

  # ── Spark Worker 1 ───────────────────────────────────────────────────────────
  spark-worker-1:
    image: apache/spark:3.5.0
    container_name: coal_spark_worker_1
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      SPARK_WORKER_MEMORY: 2g
      SPARK_WORKER_CORES: 2
    depends_on:
       spark-master:
          condition: service_started
    networks:
      - spark-net
      - storage-net
    restart: unless-stopped



  # ── Spark Worker 2 ───────────────────────────────────────────────────────────
  spark-worker-2:
    image: apache/spark:3.5.0
    container_name: coal_spark_worker_2
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      SPARK_WORKER_MEMORY: 2g
      SPARK_WORKER_CORES: 2
    depends_on:
       spark-master:
          condition: service_started
    networks:
      - spark-net
      - storage-net
    restart: unless-stopped

  # ── Airflow Init ─────────────────────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: coal_airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com \
          --password admin
        echo "Airflow init complete."
    restart: on-failure

  # ── Airflow Webserver ────────────────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: coal_airflow_webserver
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── Airflow Scheduler ────────────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: coal_airflow_scheduler
    command: scheduler
    healthcheck:
      test: ["CMD", "airflow", "jobs", "check", "--job-type", "SchedulerJob", "--hostname", "$${HOSTNAME}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── Airflow Worker 1 ─────────────────────────────────────────────────────────
  airflow-worker-1:
    <<: *airflow-common
    container_name: coal_airflow_worker_1
    command: celery worker
    environment:
      <<: *airflow-common-env
      DUMB_INIT_SETSID: "0"
    healthcheck:
      test: ["CMD-SHELL", 'celery --app airflow.providers.celery.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── Airflow Worker 2 ─────────────────────────────────────────────────────────
  airflow-worker-2:
    <<: *airflow-common
    container_name: coal_airflow_worker_2
    command: celery worker
    environment:
      <<: *airflow-common-env
      DUMB_INIT_SETSID: "0"
    healthcheck:
      test: ["CMD-SHELL", 'celery --app airflow.providers.celery.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── Airflow Flower (Worker monitoring UI) ────────────────────────────────────
  airflow-flower:
    <<: *airflow-common
    container_name: coal_airflow_flower
    command: celery flower
    ports:
      - "5555:5555"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:5555/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  airflow-net:
    driver: bridge
    name: coal_airflow_net
  spark-net:
    driver: bridge
    name: coal_spark_net
  storage-net:
    driver: bridge
    name: coal_storage_net

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    name: coal_postgres_data
  redis_data:
    name: coal_redis_data
  minio_data:
    name: coal_minio_data